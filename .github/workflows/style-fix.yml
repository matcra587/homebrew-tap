# TODO: Remove this workflow once GoReleaser ships a release
# with the cask stanza order fix (goreleaser/goreleaser#6466).
# The sub-templates still emit `url` before `sha256`, which
# violates the Homebrew Cask Cookbook stanza order.
name: Fix cask style

on:
  push:
    branches:
      - main
    paths:
      - 'Casks/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  style-fix:
    name: Fix cask style
    # Only run on commits from GoReleaser to avoid loops.
    if: github.event.head_commit.author.email == 'bot@goreleaser.com'
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to commit and push the style fix.
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@4ebd32341e5b59ae7e1581111aa99d5d34cef962 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Fix style
        run: brew style --fix "$GITHUB_REPOSITORY" || true

      - name: Set up git
        uses: Homebrew/actions/git-user-config@4ebd32341e5b59ae7e1581111aa99d5d34cef962 # main

      - name: Commit and push
        working-directory: ${{ steps.set-up-homebrew.outputs.repository-path }}
        run: |
          if ! git diff --quiet; then
            git add Casks/
            git commit -m "Fix cask stanza order"
            git push
          fi
