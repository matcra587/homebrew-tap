# TODO: Remove the style-fix steps once GoReleaser ships a release
# with the cask stanza order fix (goreleaser/goreleaser#6466).
# The sub-templates still emit `url` before `sha256`, which
# violates the Homebrew Cask Cookbook stanza order.
name: brew test-bot

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  test-bot:
    name: Test bot (${{ matrix.os }})
    strategy:
      matrix:
        os: [ ubuntu-latest, macos-26 ]
    runs-on: ${{ matrix.os }}
    permissions:
      actions: read # Required by test-bot to check workflow run status.
      checks: read # Required by test-bot to read check results.
      contents: write # Required to check out the repository and commit style fixes.
      pull-requests: read # Required by test-bot to read PR metadata.
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@4ebd32341e5b59ae7e1581111aa99d5d34cef962 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5.0.4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Fix cask style
        run: brew style --fix "$GITHUB_REPOSITORY" || true

      - run: brew test-bot --only-cleanup-before

      - run: brew test-bot --only-setup

      - run: brew test-bot --only-tap-syntax
      - run: brew test-bot --only-formulae
        if: github.event_name == 'pull_request'

      - name: Upload bottles as artifact
        if: always() && github.event_name == 'pull_request'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: bottles_${{ matrix.os }}
          path: '*.bottle.*'

      - name: Create verified style-fix commit
        if: >-
          github.event_name == 'push'
          && matrix.os == 'ubuntu-latest'
          && github.event.head_commit.author.email == 'bot@goreleaser.com'
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        env:
          REPO_PATH: ${{ steps.set-up-homebrew.outputs.repository-path }}
        with:
          script: |
            const { execSync } = require('child_process');
            const fs = require('fs');
            const path = require('path');

            const repoPath = process.env.REPO_PATH;
            const diff = execSync('git diff --name-only', { cwd: repoPath })
              .toString().trim();

            if (!diff) {
              core.info('No style changes needed.');
              return;
            }

            const commitMessage = [
              'style: fix cask stanza order',
              '',
              'Workaround for goreleaser/goreleaser#6466 - GoReleaser',
              'sub-templates emit url before sha256, violating the',
              'Homebrew Cask Cookbook stanza order.',
            ].join('\n');

            for (const file of diff.split('\n')) {
              const { data: { sha: fileSha } } = await github.rest.repos.getContent({
                ...context.repo,
                path: file,
                ref: 'main',
              });

              const content = fs.readFileSync(path.join(repoPath, file))
                .toString('base64');

              await github.rest.repos.createOrUpdateFileContents({
                ...context.repo,
                path: file,
                message: commitMessage,
                content,
                sha: fileSha,
                branch: 'main',
              });

              core.info(`Updated ${file}`);
            }
