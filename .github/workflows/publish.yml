name: brew pr-pull

on:
  # zizmor: ignore[dangerous-triggers] - pull_request_target is required by
  # Homebrew's pr-pull workflow to merge bottles from fork PRs.
  pull_request_target:
    types:
      - labeled

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions: {}

jobs:
  pr-pull:
    name: Pull bottles
    if: contains(github.event.pull_request.labels.*.name, 'pr-pull')
    runs-on: ubuntu-22.04
    permissions:
      actions: read # Required by pr-pull to check workflow run status.
      checks: read # Required by pr-pull to verify check results.
      contents: write # Required to push merged commits to main.
      issues: read # Required by pr-pull to read issue metadata.
      pull-requests: write # Required by pr-pull to update PR status.
    steps:
      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@4ebd32341e5b59ae7e1581111aa99d5d34cef962 # main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up git
        uses: Homebrew/actions/git-user-config@4ebd32341e5b59ae7e1581111aa99d5d34cef962 # main

      - name: Pull bottles
        env:
          HOMEBREW_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PULL_REQUEST: ${{ github.event.pull_request.number }}
        run: brew pr-pull --debug --tap="$GITHUB_REPOSITORY" "$PULL_REQUEST"

      - name: Push commits
        uses: Homebrew/actions/git-try-push@4ebd32341e5b59ae7e1581111aa99d5d34cef962 # main
        with:
          branch: main

      - name: Delete branch
        if: github.event.pull_request.head.repo.fork == false
        env:
          BRANCH: ${{ github.event.pull_request.head.ref }}
        run: git push --delete origin "$BRANCH"
